<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes outils — Logicop</title>
<link rel="icon" type="image/png" href="../assets/img/favicon.png">
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="topbar">
  <a class="brand" href="../index.html"><img src="../assets/img/logo.png" alt="Logicop"><span class="by-line">by Beauce Matériel</span></a>
  <nav>
    <a href="../index.html">Accueil</a>
    <span id="navAccount"></span>
  </nav>
</div>

<main>
  <div class="hero" style="padding-top:16px;">
    <h1 style="font-size:1.8rem;">Mes outils</h1>
    <p><span id="companyLabel" style="color:var(--accent); font-weight:700;"></span><span id="emailLabel" style="color:var(--text-dim);"></span></p>
  </div>

  <div class="grid" id="toolsGrid"></div>
  <p class="hint" id="emptyMsg" hidden style="text-align:center;">
    Aucun outil ne vous a encore été attribué. Demandez à un gestionnaire de vous donner les accès.
  </p>

  <footer>Logicop</footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>
  (async function init() {
    const session = await requireSession('login.html');
    if (!session) return;
    const profile = await loadCurrentProfile();
    if (!profile) { window.location.href = 'login.html'; return; }
    if (profile.is_admin) { window.location.href = 'admin.html'; return; }

    renderNavAccount('navAccount', '');

    if (!profile.company_id) {
      document.getElementById('emailLabel').textContent = profile.email;
      document.getElementById('emptyMsg').hidden = false;
      document.getElementById('emptyMsg').textContent =
        "Votre compte n'est pas encore rattaché à une entreprise. Contactez Logicop pour activer votre accès.";
      return;
    }

    const { data: company } = await supabaseClient.from('companies').select('name').eq('id', profile.company_id).single();
    if (company) {
      document.getElementById('companyLabel').textContent = company.name;
      document.getElementById('emailLabel').textContent = ' — ' + profile.email;
    } else {
      document.getElementById('emailLabel').textContent = profile.email;
    }

    const { data: tools, error } = await supabaseClient.from('tools').select('*').order('name');
    if (error) { console.error(error); return; }

    const grid = document.getElementById('toolsGrid');
    document.getElementById('emptyMsg').hidden = (tools || []).length > 0;

    const BRAND_LOGOS = [
      { match: /hangcha/i, src: '../assets/img/logo.hangcha.png' },
      { match: /mitsubishi/i, src: '../assets/img/logo.mitsubishi.png' },
      { match: /cesab/i, src: '../assets/img/logo.cesab.png' },
      { match: /\bep\b/i, src: '../assets/img/logo.ep.png' },
      { match: /byd/i, src: '../assets/img/logo.byd.png' },
    ];
    function toolIconHtml(tool) {
      const appType = (tool.config || {}).appType;
      if (appType === 'capacite_residuelle') return `<div class="icon brand-icon"><img src="../assets/img/capacite.residuelle.png" alt=""></div>`;
      if (appType === 'transport') return `<div class="icon brand-icon"><img src="../assets/img/transport.png" alt=""></div>`;
      if (appType === 'documents') return `<div class="icon">📄</div>`;
      const brand = BRAND_LOGOS.find((b) => b.match.test(tool.name) || b.match.test(tool.description || ''));
      if (brand) return `<div class="icon brand-icon"><img src="${brand.src}" alt=""></div>`;
      return `<div class="icon">📄→📊</div>`;
    }
    function toolHref(tool) {
      const appType = (tool.config || {}).appType;
      if (appType === 'capacite_residuelle') return `../outils/capacite-residuelle.html?tool=${tool.id}`;
      if (appType === 'transport') return `../outils/transport.html?tool=${tool.id}`;
      if (appType === 'documents') return `../outils/documents.html?tool=${tool.id}`;
      return `../outils/executer-devis.html?tool=${tool.id}`;
    }

    // Ordre personnalisé + favoris, stockés localement par utilisateur
    const FAVS_KEY = 'logicop_favs_' + profile.id;
    const ORDER_KEY = 'logicop_order_' + profile.id;
    function loadFavs() {
      try { return new Set(JSON.parse(localStorage.getItem(FAVS_KEY) || '[]')); } catch { return new Set(); }
    }
    function saveFavs(favs) {
      localStorage.setItem(FAVS_KEY, JSON.stringify([...favs]));
    }
    function loadOrder() {
      try { return JSON.parse(localStorage.getItem(ORDER_KEY) || '[]'); } catch { return []; }
    }
    function saveOrder(ids) {
      localStorage.setItem(ORDER_KEY, JSON.stringify(ids));
    }
    const favs = loadFavs();

    let dragId = null;

    function renderTools() {
      grid.innerHTML = '';
      const orderList = loadOrder();
      const orderMap = {};
      orderList.forEach(function(id, i) { orderMap[id] = i; });
      const sorted = [...(tools || [])].sort(function(a, b) {
        const fa = favs.has(a.id) ? 0 : 1;
        const fb = favs.has(b.id) ? 0 : 1;
        if (fa !== fb) return fa - fb;
        const oa = orderMap[a.id] !== undefined ? orderMap[a.id] : 9999;
        const ob = orderMap[b.id] !== undefined ? orderMap[b.id] : 9999;
        if (oa !== ob) return oa - ob;
        return a.name.localeCompare(b.name);
      });
      sorted.forEach(function(tool) {
        const isFav = favs.has(tool.id);
        const a = document.createElement('a');
        a.className = 'card available';
        a.href = toolHref(tool);
        a.style.position = 'relative';
        a.draggable = true;
        a.dataset.toolId = tool.id;
        a.innerHTML = `
          <span class="drag-handle" title="Maintenir et glisser pour réorganiser">⠿</span>
          <button type="button" class="fav-btn${isFav ? ' active' : ''}" title="${isFav ? 'Retirer des favoris' : 'Ajouter aux favoris'}">${isFav ? '★' : '☆'}</button>
          ${toolIconHtml(tool)}
          <span class="tag ok">Disponible</span>
          <h3>${tool.name}</h3>
          <p>${tool.description || ''}</p>
        `;
        a.querySelector('.fav-btn').addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          if (favs.has(tool.id)) favs.delete(tool.id); else favs.add(tool.id);
          saveFavs(favs);
          renderTools();
        });
        a.addEventListener('dragstart', function(e) {
          dragId = tool.id;
          a.style.opacity = '0.4';
          e.dataTransfer.effectAllowed = 'move';
        });
        a.addEventListener('dragend', function() {
          a.style.opacity = '';
          dragId = null;
          grid.querySelectorAll('.card').forEach(function(c) { c.classList.remove('drag-over'); });
        });
        a.addEventListener('dragover', function(e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          a.classList.add('drag-over');
        });
        a.addEventListener('dragleave', function() {
          a.classList.remove('drag-over');
        });
        a.addEventListener('drop', function(e) {
          e.preventDefault();
          a.classList.remove('drag-over');
          if (!dragId || dragId === tool.id) return;
          var cards = Array.from(grid.querySelectorAll('.card[data-tool-id]'));
          var currentOrder = cards.map(function(c) { return c.dataset.toolId; });
          var fromIdx = currentOrder.indexOf(dragId);
          var toIdx = currentOrder.indexOf(tool.id);
          if (fromIdx < 0 || toIdx < 0) return;
          currentOrder.splice(fromIdx, 1);
          currentOrder.splice(toIdx, 0, dragId);
          saveOrder(currentOrder);
          renderTools();
        });
        grid.appendChild(a);
      });
    }
    renderTools();
  })();
</script>
</body>
</html>
