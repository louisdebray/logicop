<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code BLG — Logicop</title>
<link rel="icon" type="image/png" href="../assets/img/favicon.png">
<link rel="stylesheet" href="../assets/css/style.css">
<style>
  .drop-zone {
    border: 2px dashed var(--panel-border); border-radius: 12px;
    padding: 40px 20px; text-align: center; cursor: pointer;
    transition: border-color .2s, background .2s;
    margin-bottom: 20px;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent); background: rgba(181,80,42,.06);
  }
  .drop-zone p { margin: 0; color: var(--text-dim); }
  .drop-zone .big { font-size: 2rem; margin-bottom: 8px; }

  .preview-area { text-align: center; margin: 20px 0; }
  .preview-area canvas {
    max-width: 100%; border: 1px solid var(--panel-border);
    border-radius: 8px; background: #fff;
  }
  .preview-area .info {
    font-size: 0.82rem; color: var(--text-dim); margin-top: 8px;
  }

  .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin: 16px 0; }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="../index.html"><img src="../assets/img/logo.png" alt="Logicop"><span class="by-line">by Beauce Matériel</span></a>
  <nav>
    <span id="navAccount"></span>
  </nav>
</div>

<main>
  <p style="margin-bottom:8px;"><a id="backLink" href="../pages/dashboard.html">← Mes outils</a></p>
  <div class="hero" style="padding-top:16px; text-align:left;">
    <h1 style="font-size:1.8rem; margin:0;" id="toolTitle">QR Code BLG</h1>
    <p id="toolDesc" style="margin:8px 0 0;"></p>
  </div>

  <div class="step" id="notFoundStep" hidden>
    <p class="hint">Cet outil est introuvable ou ne vous a pas été attribué. Retournez à
       <a href="../pages/dashboard.html">vos outils</a>.</p>
  </div>

  <div id="content" hidden>
    <div class="step">
      <div class="drop-zone" id="dropZone">
        <p class="big">📄</p>
        <p>Glissez un PDF ici ou <strong>cliquez pour choisir un fichier</strong></p>
        <input type="file" id="fileInput" accept=".pdf" hidden>
      </div>

      <div id="resultArea" hidden>
        <div class="preview-area">
          <canvas id="previewCanvas"></canvas>
          <p class="info" id="previewInfo"></p>
        </div>
        <div class="actions">
          <button id="btnDownload">Télécharger en PNG</button>
          <button class="secondary" id="btnReset">Nouveau fichier</button>
        </div>
      </div>
    </div>
  </div>

  <footer>Logicop</footer>
</main>

<script type="module">
  import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.min.mjs';
  window.pdfjsLib = pdfjsLib;
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>
(function() {
  'use strict';

  var DPI = 300;
  var OUTPUT_MM = 57;
  var OUTPUT_PX = Math.round(OUTPUT_MM / 25.4 * DPI); // 673px
  // Dashed border occupies 0-3px and 831-834px at 300 DPI. Content is inside.
  var BORDER_PX = 3;
  var OUTER_PX = 834;
  var INNER_PX = OUTER_PX - BORDER_PX * 2; // 828px content area
  var pngDataUrl = null;
  var currentFileName = '';

  function waitForPdfJs() {
    return new Promise(function(resolve) {
      (function check() {
        if (window.pdfjsLib) {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.6.82/build/pdf.worker.min.mjs';
          return resolve(window.pdfjsLib);
        }
        setTimeout(check, 50);
      })();
    });
  }

  async function initPage() {
    var session = await requireSession('../pages/login.html');
    if (!session) return;
    var profile = await loadCurrentProfile();
    if (!profile) { window.location.href = '../pages/login.html'; return; }

    renderNavAccount('navAccount', '../pages/');
    if (profile.is_admin) document.getElementById('backLink').href = '../pages/admin.html';

    var params = new URLSearchParams(window.location.search);
    var toolId = params.get('tool');
    if (!toolId) { document.getElementById('notFoundStep').hidden = false; return; }

    var res = await supabaseClient.from('tools').select('*').eq('id', toolId).single();
    if (!res.data) { document.getElementById('notFoundStep').hidden = false; return; }

    document.getElementById('toolTitle').textContent = res.data.name;
    document.getElementById('toolDesc').textContent = res.data.description || '';
    document.getElementById('content').hidden = false;

    setupDropZone();
  }

  function setupDropZone() {
    var dropZone = document.getElementById('dropZone');
    var fileInput = document.getElementById('fileInput');

    dropZone.addEventListener('click', function() { fileInput.click(); });
    fileInput.addEventListener('change', function() {
      if (fileInput.files.length) processFile(fileInput.files[0]);
    });
    dropZone.addEventListener('dragover', function(e) {
      e.preventDefault(); dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', function() {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', function(e) {
      e.preventDefault(); dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
    });

    document.getElementById('btnDownload').addEventListener('click', downloadPng);
    document.getElementById('btnReset').addEventListener('click', function() {
      document.getElementById('resultArea').hidden = true;
      document.getElementById('dropZone').style.display = '';
      fileInput.value = '';
      pngDataUrl = null;
    });
  }

  async function processFile(file) {
    if (!file.name.toLowerCase().endsWith('.pdf') && file.type !== 'application/pdf') { alert('Veuillez sélectionner un fichier PDF.'); return; }
    currentFileName = file.name.replace(/\.pdf$/i, '');

    var pdfjsLib = await waitForPdfJs();
    var arrayBuffer = await file.arrayBuffer();
    var pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    var page = await pdf.getPage(1);

    var scale = DPI / 72;
    var viewport = page.getViewport({ scale: scale });

    var renderCanvas = document.createElement('canvas');
    renderCanvas.width = viewport.width;
    renderCanvas.height = viewport.height;
    var ctx = renderCanvas.getContext('2d');

    await page.render({ canvasContext: ctx, viewport: viewport }).promise;

    // Fixed crop: the dashed rectangle is always CROP_PX × CROP_PX from origin
    var cropCanvas = document.getElementById('previewCanvas');
    cropCanvas.width = OUTPUT_PX;
    cropCanvas.height = OUTPUT_PX;
    var cropCtx = cropCanvas.getContext('2d');
    cropCtx.fillStyle = '#ffffff';
    cropCtx.fillRect(0, 0, OUTPUT_PX, OUTPUT_PX);
    cropCtx.drawImage(renderCanvas, BORDER_PX, BORDER_PX, INNER_PX, INNER_PX, 0, 0, OUTPUT_PX, OUTPUT_PX);

    pngDataUrl = cropCanvas.toDataURL('image/png');

    document.getElementById('previewInfo').textContent =
      OUTPUT_PX + ' × ' + OUTPUT_PX + ' px — ' + OUTPUT_MM + ' × ' + OUTPUT_MM + ' mm à 300 DPI';

    document.getElementById('dropZone').style.display = 'none';
    document.getElementById('resultArea').hidden = false;
  }

  function downloadPng() {
    if (!pngDataUrl) return;
    var a = document.createElement('a');
    a.href = pngDataUrl;
    a.download = currentFileName + '_etiquette.png';
    a.click();
  }

  initPage();
})();
</script>
</body>
</html>
