<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulation coefficient — Logicop</title>
<link rel="icon" type="image/png" href="../assets/img/favicon.png">
<link rel="stylesheet" href="../assets/css/style.css">
<style>
  .sim-layout {
    display: flex; gap: 20px; align-items: flex-start; margin-top: 10px;
    flex-wrap: nowrap;
    height: calc(100vh - 400px);
    min-height: 400px;
  }

  /* ── Carte simulation ──────────────────────────────────── */
  .machine-card {
    background: var(--bg, #fff); border: 1px solid var(--panel-border);
    border-radius: 12px; overflow: hidden; flex: 1; min-width: 420px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .machine-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; background: var(--accent); color: #fff;
  }
  .machine-header h3 { margin: 0; font-size: 0.95rem; font-weight: 700; }
  .machine-body { display: flex; gap: 0; }

  .col-inputs {
    flex: 1; padding: 12px 16px; border-right: 1px solid var(--panel-border);
  }
  .section-label {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: .05em;
    color: var(--text-dim); font-weight: 700; margin: 10px 0 6px;
    padding-bottom: 3px; border-bottom: 1px solid var(--panel-border);
  }
  .section-label:first-child { margin-top: 0; }
  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; }
  .fields-grid .wide { grid-column: 1 / -1; }
  .sim-field { margin-bottom: 4px; }
  .sim-field label {
    display: block; font-size: 0.72rem; color: var(--text-dim);
    margin-bottom: 1px; font-weight: 500;
  }
  .sim-field input {
    width: 100%; padding: 5px 8px; border: 1px solid var(--panel-border);
    border-radius: 6px; font-size: 0.85rem; background: var(--bg-soft);
    box-sizing: border-box; transition: border-color .15s;
  }
  .sim-field input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(181,80,42,.15);
  }
  .sim-field input[readonly] {
    background: var(--panel-border); color: var(--text-dim); cursor: not-allowed;
  }

  .col-results {
    width: 210px; flex-shrink: 0; padding: 12px 16px;
    display: flex; flex-direction: column; justify-content: center;
    background: var(--bg-soft);
  }
  .sim-result {
    display: flex; justify-content: space-between; align-items: center; padding: 4px 0;
  }
  .sim-result label { font-size: 0.72rem; color: var(--text-dim); font-weight: 500; }
  .sim-result .value {
    font-size: 0.88rem; font-weight: 700; color: var(--accent);
    text-align: right; white-space: nowrap;
  }
  .result-total {
    margin-top: 6px; padding-top: 8px; border-top: 2px solid var(--accent);
    display: flex; justify-content: space-between; align-items: center;
  }
  .result-total label { font-size: 0.82rem; font-weight: 700; color: var(--text); }
  .result-total .value { font-size: 1.05rem; font-weight: 800; color: var(--text); white-space: nowrap; }
  .result-coeff {
    margin-top: 8px; text-align: center; padding: 8px;
    background: #e8f5e9; border-radius: 8px;
  }
  .result-coeff label {
    display: block; font-size: 0.68rem; text-transform: uppercase;
    letter-spacing: .04em; color: #2e7d32; font-weight: 600; margin-bottom: 2px;
  }
  .result-coeff .value { font-size: 1.2rem; font-weight: 800; color: #2e7d32; }

  /* ── Tableau typologies ────────────────────────────────── */
  .typo-card {
    background: var(--bg, #fff); border: 1px solid var(--panel-border);
    border-radius: 12px; min-width: 320px; flex: 0 1 400px;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
    display: flex; flex-direction: column;
    overflow: hidden; align-self: stretch;
  }
  .typo-header {
    padding: 10px 16px; background: var(--accent); color: #fff;
    margin: 0; flex-shrink: 0;
    border-radius: 12px 12px 0 0;
  }
  .typo-header h3 { margin: 0; padding: 0; font-size: 0.95rem; font-weight: 700; }
  .typo-body { padding: 0; margin: 0; overflow-y: auto; flex: 1; }
  .typo-cols {
    display: flex; background: #c4704a; flex-shrink: 0;
  }
  .typo-cols .typo-col {
    font-size: 0.72rem; text-transform: uppercase; letter-spacing: .04em;
    color: #fff; font-weight: 600; padding: 8px 14px;
  }
  .typo-cols .typo-col:first-child { flex: 1; }
  .typo-cols .typo-col.tc { width: 90px; text-align: center; flex-shrink: 0; }
  .typo-body table { width: 100%; border-collapse: collapse; border-spacing: 0; margin-top: 0; }
  .typo-body td {
    padding: 10px 14px; font-size: 0.85rem;
  }
  .typo-body tbody tr { border-bottom: 1px solid var(--panel-border); }
  .typo-body tr:last-child { border-bottom: none; }
  .typo-body tr:nth-child(even) { background: var(--bg-soft); }
  .typo-body .typo-name { font-weight: 600; }
  .typo-body .typo-price {
    text-align: center; font-weight: 700; font-size: 0.9rem; width: 90px;
    font-variant-numeric: tabular-nums;
  }
  .typo-body .typo-price.full { color: var(--accent); }
  .typo-body .typo-price.mini { color: #2e7d32; }
  .typo-empty {
    padding: 20px; text-align: center; color: var(--text-dim); font-size: 0.85rem;
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="../index.html"><img src="../assets/img/logo.png" alt="Logicop"><span class="by-line">by Beauce Matériel</span></a>
  <nav>
    <span id="navAccount"></span>
  </nav>
</div>

<main>
  <p style="margin-bottom:8px;"><a id="backLink" href="../pages/dashboard.html">← Mes outils</a></p>
  <div class="hero" style="padding-top:10px; text-align:left;">
    <h1 style="font-size:1.8rem; margin:0;" id="toolTitle">Simulation coefficient</h1>
    <p id="toolDesc" style="margin:4px 0 0;"></p>
  </div>

  <div class="step" id="notFoundStep" hidden>
    <p class="hint">Cet outil est introuvable ou ne vous a pas été attribué. Retournez à
       <a href="../pages/dashboard.html">vos outils</a>.</p>
  </div>

  <div id="content" hidden>
    <div class="sim-layout">
      <!-- Simulation -->
      <div class="machine-card">
        <div class="machine-header"><h3>Simulation</h3></div>
        <div class="machine-body">
          <div class="col-inputs">
            <div class="section-label">Financement</div>
            <div class="fields-grid">
              <div class="sim-field wide">
                <label>Prix de vente €</label>
                <input type="text" id="f_base" value="0">
              </div>
              <div class="sim-field">
                <label>Taux d'intérêt %</label>
                <input type="text" id="f_taux" value="4,20" readonly>
              </div>
              <div class="sim-field">
                <label>Durée (mois)</label>
                <input type="text" id="f_duree" value="0">
              </div>
              <div class="sim-field">
                <label>Valeur résiduelle %</label>
                <input type="text" id="f_vr" value="0">
              </div>
            </div>
            <div class="section-label">Service</div>
            <div class="fields-grid">
              <div class="sim-field">
                <label>Maintenance (€/h)</label>
                <input type="text" id="f_maint_h" value="0">
              </div>
              <div class="sim-field">
                <label>Heures / an</label>
                <input type="text" id="f_heures" value="0">
              </div>
              <div class="sim-field">
                <label>VGP (€/mois)</label>
                <input type="text" id="f_vgp" value="0">
              </div>
              <div class="sim-field">
                <label>Option full service (€/mois)</label>
                <input type="text" id="f_option_fs" value="0">
              </div>
            </div>
          </div>
          <div class="col-results">
            <div class="sim-result"><label>Valeur résiduelle</label><div class="value" id="r_vr">0,00 €</div></div>
            <div class="sim-result"><label>Loyer financier / mois</label><div class="value" id="r_loyer_fin">0,00 €</div></div>
            <div class="sim-result"><label>Maintenance / mois</label><div class="value" id="r_maint">0,00 €</div></div>
            <div class="result-total"><label>Total mensuel</label><div class="value" id="r_total">0,00 €</div></div>
            <div class="result-coeff"><label>Coefficient financier</label><div class="value" id="r_coeff">0</div></div>
          </div>
        </div>
      </div>

      <!-- Tableau typologies -->
      <div class="typo-card">
        <div class="typo-header"><h3>Conditions de full service</h3></div>
        <div class="typo-cols">
          <div class="typo-col">Typologie</div>
          <div class="typo-col tc">Full</div>
          <div class="typo-col tc">Mini</div>
        </div>
        <div class="typo-body">
          <table>
            <tbody id="typoBody"></tbody>
          </table>
          <p class="typo-empty" id="typoEmpty" hidden>Aucune typologie configurée.</p>
        </div>
      </div>
    </div>
  </div>

  <footer>Logicop</footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>
(function() {
  'use strict';

  function parseFr(s) {
    if (!s) return 0;
    var clean = String(s).replace(/\s/g, '');
    if (clean.indexOf(',') >= 0 && clean.indexOf('.') >= 0) {
      clean = clean.replace(/\./g, '').replace(',', '.');
    } else {
      clean = clean.replace(',', '.');
    }
    var v = parseFloat(clean);
    return isNaN(v) ? 0 : v;
  }

  function fmt(n) {
    if (isNaN(n) || !isFinite(n)) return '0,00';
    return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function pmt(rate, nper, pv, fv, type) {
    if (rate === 0) return -(pv + fv) / nper;
    var pvif = Math.pow(1 + rate, nper);
    var p = rate * (pv * pvif + fv) / (pvif - 1);
    if (type === 1) p /= (1 + rate);
    return -p;
  }

  function gv(id) { return parseFr(document.getElementById(id).value); }

  function calc() {
    var base = gv('f_base');
    var taux = gv('f_taux') / 100;
    var duree = gv('f_duree');
    var vrPct = gv('f_vr') / 100;
    var maintH = gv('f_maint_h');
    var heures = gv('f_heures');
    var vgp = gv('f_vgp');
    var optFs = gv('f_option_fs');

    var valResid = base * vrPct;
    document.getElementById('r_vr').textContent = fmt(valResid) + ' €';

    var loyerFin = 0;
    if (base > 0 && duree > 0) {
      loyerFin = pmt(taux / 12, duree, -base, valResid, 1);
    }
    document.getElementById('r_loyer_fin').textContent = fmt(loyerFin) + ' €';

    var totalMaint = (maintH * heures) / 12 + vgp + optFs;
    document.getElementById('r_maint').textContent = fmt(totalMaint) + ' €';

    var total = loyerFin + totalMaint;
    document.getElementById('r_total').textContent = fmt(total) + ' €';

    var coeff = base > 0 ? (loyerFin / base) * 100 : 0;
    document.getElementById('r_coeff').textContent = coeff ? coeff.toFixed(4).replace('.', ',') : '0';
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function renderTypologies(typologies) {
    var tbody = document.getElementById('typoBody');
    var empty = document.getElementById('typoEmpty');
    tbody.innerHTML = '';
    if (!typologies || !typologies.length) {
      empty.hidden = false;
      return;
    }
    empty.hidden = true;
    typologies.forEach(function(t) {
      var tr = document.createElement('tr');
      tr.innerHTML = '<td class="typo-name">' + escHtml(t.name || '') + '</td>'
        + '<td class="typo-price full">' + escHtml(t.full || '—') + ' €/h</td>'
        + '<td class="typo-price mini">' + escHtml(t.mini || '—') + ' €/h</td>';
      tbody.appendChild(tr);
    });
  }

  // Bind all inputs
  var inputs = document.querySelectorAll('.col-inputs input:not([readonly])');
  inputs.forEach(function(inp) {
    inp.addEventListener('input', calc);
    inp.addEventListener('change', calc);
    inp.addEventListener('focus', function() { if (inp.value === '0') inp.value = ''; });
    inp.addEventListener('blur', function() { if (inp.value.trim() === '') inp.value = '0'; calc(); });
  });

  async function initPage() {
    var session = await requireSession('../pages/login.html');
    if (!session) return;
    var profile = await loadCurrentProfile();
    if (!profile) { window.location.href = '../pages/login.html'; return; }

    renderNavAccount('navAccount', '../pages/');
    if (profile.is_admin) document.getElementById('backLink').href = '../pages/admin.html';

    var params = new URLSearchParams(window.location.search);
    var toolId = params.get('tool');
    if (!toolId) { document.getElementById('notFoundStep').hidden = false; return; }

    var res = await supabaseClient.from('tools').select('*').eq('id', toolId).single();
    if (!res.data) { document.getElementById('notFoundStep').hidden = false; return; }

    document.getElementById('toolTitle').textContent = res.data.name;
    document.getElementById('toolDesc').textContent = res.data.description || '';
    document.getElementById('content').hidden = false;

    // Load company settings (taux + typologies)
    if (profile.company_id) {
      var settingsRes = await supabaseClient.from('tool_company_settings')
        .select('*').eq('tool_id', toolId).eq('company_id', profile.company_id).maybeSingle();
      if (settingsRes.data && settingsRes.data.settings) {
        var s = settingsRes.data.settings;
        if (s.taux) document.getElementById('f_taux').value = s.taux;
        renderTypologies(s.typologies || []);
      } else {
        renderTypologies([]);
      }
    } else {
      renderTypologies([]);
    }

    calc();
  }

  initPage();
})();
</script>
</body>
</html>
