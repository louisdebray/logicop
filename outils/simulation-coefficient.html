<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulation coefficient — Logicop</title>
<link rel="icon" type="image/png" href="../assets/img/favicon.png">
<link rel="stylesheet" href="../assets/css/style.css">
<style>
  /* ── Bandeau paramètres ──────────────────────────────── */
  .params-bar {
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    margin-top: 12px; padding: 14px 20px;
    background: linear-gradient(135deg, var(--bg-soft), rgba(181,80,42,.06));
    border: 1px solid var(--panel-border); border-radius: 12px;
  }
  .params-bar .param-group { display: flex; align-items: center; gap: 6px; }
  .params-bar label {
    font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase;
    letter-spacing: .04em; font-weight: 600; white-space: nowrap;
  }
  .params-bar input {
    width: 60px; padding: 5px 6px; border: 1px solid var(--panel-border);
    border-radius: 6px; font-size: 0.88rem; text-align: right; background: var(--bg, #fff);
  }
  .params-bar input.date-input { width: 90px; text-align: center; }
  .params-bar .unit { font-size: 0.82rem; color: var(--text-dim); }
  .params-bar .sep { width: 1px; height: 28px; background: var(--panel-border); flex-shrink: 0; }

  /* ── Grille machines ──────────────────────────────────── */
  .sim-container { overflow-x: auto; padding: 4px 0 12px; }
  .sim-grid { display: flex; gap: 16px; min-width: min-content; align-items: flex-start; }

  .machine-card {
    background: var(--bg, #fff); border: 1px solid var(--panel-border);
    border-radius: 12px; min-width: 520px; flex-shrink: 0; overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.06); transition: box-shadow .2s;
  }
  .machine-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }

  .machine-header {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; background: var(--accent); color: #fff;
  }
  .machine-header h3 { margin: 0; font-size: 0.95rem; flex: 1; font-weight: 700; }
  .machine-header .remove-btn {
    background: none; border: none; color: rgba(255,255,255,.7);
    font-size: 1.1rem; cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .machine-header .remove-btn:hover { color: #fff; }

  .machine-body {
    display: flex; gap: 0;
  }

  /* ── Colonne gauche : saisie ─────────────────────────── */
  .col-inputs {
    flex: 1; padding: 12px 16px; border-right: 1px solid var(--panel-border);
  }
  .section-label {
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: .05em;
    color: var(--text-dim); font-weight: 700; margin: 10px 0 6px;
    padding-bottom: 3px; border-bottom: 1px solid var(--panel-border);
  }
  .section-label:first-child { margin-top: 0; }

  .fields-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px;
  }
  .fields-grid .wide { grid-column: 1 / -1; }

  .sim-field { margin-bottom: 4px; }
  .sim-field label {
    display: block; font-size: 0.72rem; color: var(--text-dim);
    margin-bottom: 1px; font-weight: 500;
  }
  .sim-field input {
    width: 100%; padding: 5px 8px; border: 1px solid var(--panel-border);
    border-radius: 6px; font-size: 0.85rem; background: var(--bg-soft);
    box-sizing: border-box; transition: border-color .15s;
  }
  .sim-field input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(181,80,42,.15);
  }

  /* ── Colonne droite : résultats ──────────────────────── */
  .col-results {
    width: 210px; flex-shrink: 0; padding: 12px 16px;
    display: flex; flex-direction: column; justify-content: center;
    background: var(--bg-soft);
  }

  .sim-result {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0;
  }
  .sim-result label {
    font-size: 0.72rem; color: var(--text-dim); font-weight: 500;
  }
  .sim-result .value {
    font-size: 0.88rem; font-weight: 700; color: var(--accent);
    text-align: right; white-space: nowrap;
  }

  .result-total {
    margin-top: 6px; padding-top: 8px;
    border-top: 2px solid var(--accent);
    display: flex; justify-content: space-between; align-items: center;
  }
  .result-total label { font-size: 0.82rem; font-weight: 700; color: var(--text); }
  .result-total .value { font-size: 1.05rem; font-weight: 800; color: var(--text); white-space: nowrap; }

  .result-coeff {
    margin-top: 8px; text-align: center; padding: 8px;
    background: #e8f5e9; border-radius: 8px;
  }
  .result-coeff label {
    display: block; font-size: 0.68rem; text-transform: uppercase;
    letter-spacing: .04em; color: #2e7d32; font-weight: 600; margin-bottom: 2px;
  }
  .result-coeff .value { font-size: 1.2rem; font-weight: 800; color: #2e7d32; }

  /* ── Bouton ajouter ───────────────────────────────────── */
  .add-machine {
    display: flex; align-items: center; justify-content: center;
    min-width: 100px; align-self: stretch;
    border: 2px dashed var(--panel-border); border-radius: 12px;
    cursor: pointer; color: var(--text-dim); font-size: 0.85rem;
    transition: border-color .2s, background .2s;
    flex-shrink: 0; flex-direction: column; gap: 8px;
  }
  .add-machine:hover { border-color: var(--accent); background: rgba(181,80,42,.06); }
  .add-machine .plus {
    font-size: 2rem; line-height: 1; color: var(--accent);
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--accent); border-radius: 50%;
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="../index.html"><img src="../assets/img/logo.png" alt="Logicop"><span class="by-line">by Beauce Matériel</span></a>
  <nav>
    <span id="navAccount"></span>
  </nav>
</div>

<main>
  <p style="margin-bottom:8px;"><a id="backLink" href="../pages/dashboard.html">← Mes outils</a></p>
  <div class="hero" style="padding-top:10px; text-align:left;">
    <h1 style="font-size:1.8rem; margin:0;" id="toolTitle">Simulation coefficient</h1>
    <p id="toolDesc" style="margin:4px 0 0;"></p>
  </div>

  <div class="step" id="notFoundStep" hidden>
    <p class="hint">Cet outil est introuvable ou ne vous a pas été attribué. Retournez à
       <a href="../pages/dashboard.html">vos outils</a>.</p>
  </div>

  <div id="content" hidden>
    <div class="params-bar">
      <div class="param-group">
        <label>Taux d'intérêt</label>
        <input type="text" id="defaultTaux" value="4,20"> <span class="unit">%</span>
      </div>
      <div class="sep"></div>
      <div class="param-group">
        <label>EURIBOR 1 AN</label>
        <input type="text" id="euribor" value="3,42"> <span class="unit">%</span>
        <span class="unit">du</span>
        <input type="text" id="euriborDate" value="31/07/2024" class="date-input">
      </div>
      <div class="sep"></div>
      <div class="param-group">
        <label>Marge banque</label>
        <input type="text" id="margeBanque" value="18,57"> <span class="unit">%</span>
      </div>
    </div>

    <div class="step" style="margin-top:10px;">
      <div class="sim-container">
        <div class="sim-grid" id="simGrid">
          <div class="add-machine" id="btnAddMachine">
            <span class="plus">+</span>
            <span>Ajouter</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer>Logicop</footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="../assets/js/supabase-config.js"></script>
<script>
(function() {
  'use strict';

  var machineCount = 0;
  var machines = [];

  function parseFr(s) {
    if (!s) return 0;
    var clean = String(s).replace(/\s/g, '');
    // "1.234,56" → "1234.56" | "1,8" → "1.8" | "1.8" → "1.8"
    if (clean.indexOf(',') >= 0 && clean.indexOf('.') >= 0) {
      // both present: dot is thousands, comma is decimal
      clean = clean.replace(/\./g, '').replace(',', '.');
    } else {
      clean = clean.replace(',', '.');
    }
    var v = parseFloat(clean);
    return isNaN(v) ? 0 : v;
  }

  function fmt(n) {
    if (isNaN(n) || !isFinite(n)) return '0,00';
    return n.toLocaleString('fr-FR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function pmt(rate, nper, pv, fv, type) {
    if (rate === 0) return -(pv + fv) / nper;
    var pvif = Math.pow(1 + rate, nper);
    var p = rate * (pv * pvif + fv) / (pvif - 1);
    if (type === 1) p /= (1 + rate);
    return -p;
  }

  function getDefaultTaux() {
    return parseFr(document.getElementById('defaultTaux').value) / 100;
  }

  function createMachine() {
    machineCount++;
    var id = machineCount;
    var card = document.createElement('div');
    card.className = 'machine-card';
    card.dataset.id = id;

    var taux = getDefaultTaux();
    var tauxStr = (taux * 100).toFixed(2).replace('.', ',');

    card.innerHTML =
      '<div class="machine-header"><h3><span>Machine ' + id + '</span></h3><button class="remove-btn" title="Supprimer">✕</button></div>'
      + '<div class="machine-body">'
      + '<div class="col-inputs">'
      + '<div class="section-label">Financement</div>'
      + '<div class="fields-grid">'
      + sf(id, 'base', 'Base locative €', '0', true)
      + sf(id, 'taux', "Taux d'intérêt %", tauxStr)
      + sf(id, 'duree', 'Durée (mois)', '0')
      + sf(id, 'vr', 'Valeur résiduelle %', '0')
      + sf(id, 'other', 'Other criteria', '1')
      + '</div>'
      + '<div class="section-label">Service</div>'
      + '<div class="fields-grid">'
      + sf(id, 'maint_h', 'Maintenance (€/h)', '0')
      + sf(id, 'heures', 'Heures / an', '0')
      + sf(id, 'vgp', 'VGP (€/mois)', '0')
      + sf(id, 'option_fs', 'Option full service (€/mois)', '0')
      + '</div>'
      + '</div>'
      + '<div class="col-results">'
      + sr_html(id, 'res_vr', 'Valeur résiduelle')
      + sr_html(id, 'res_loyer_fin', 'Loyer financier / mois')
      + sr_html(id, 'res_maint', 'Maintenance / mois')
      + sr_html(id, 'res_loyer_serv', 'Loyer service / mois')
      + '<div class="result-total"><label>Total mensuel</label><div class="value" id="m' + id + '_res_total">0,00 €</div></div>'
      + '<div class="result-coeff"><label>Coefficient financier</label><div class="value" id="m' + id + '_res_coeff">0</div></div>'
      + '</div>'
      + '</div>';

    card.querySelector('.remove-btn').addEventListener('click', function() {
      var idx = machines.indexOf(card);
      if (idx >= 0) machines.splice(idx, 1);
      card.remove();
      updateHeaders();
    });

    var addBtn = document.getElementById('btnAddMachine');
    addBtn.parentNode.insertBefore(card, addBtn);
    machines.push(card);
    updateHeaders();

    card.querySelectorAll('.col-inputs input').forEach(function(inp) {
      inp.addEventListener('input', function() { calc(card); });
      inp.addEventListener('change', function() { calc(card); });
      inp.addEventListener('focus', function() {
        if (inp.value === '0') inp.value = '';
      });
      inp.addEventListener('blur', function() {
        if (inp.value.trim() === '') inp.value = '0';
        calc(card);
      });
    });

    calc(card);
    return card;
  }

  function sf(id, key, label, defVal, wide) {
    return '<div class="sim-field' + (wide ? ' wide' : '') + '">'
      + '<label for="m' + id + '_' + key + '">' + label + '</label>'
      + '<input type="text" id="m' + id + '_' + key + '" value="' + (defVal || '0') + '">'
      + '</div>';
  }

  function sr_html(id, key, label) {
    return '<div class="sim-result">'
      + '<label>' + label + '</label>'
      + '<div class="value" id="m' + id + '_' + key + '">0,00 €</div>'
      + '</div>';
  }

  function gv(card, key) {
    var inp = card.querySelector('#m' + card.dataset.id + '_' + key);
    return inp ? parseFr(inp.value) : 0;
  }

  function sr(card, key, val) {
    var el = card.querySelector('#m' + card.dataset.id + '_' + key);
    if (el) el.textContent = fmt(val) + ' €';
  }

  function calc(card) {
    var base = gv(card, 'base');
    var taux = gv(card, 'taux') / 100;
    var duree = gv(card, 'duree');
    var vrPct = gv(card, 'vr') / 100;
    var other = gv(card, 'other');
    var maintH = gv(card, 'maint_h');
    var heures = gv(card, 'heures');
    var vgp = gv(card, 'vgp');
    var optFs = gv(card, 'option_fs');

    var valResid = base * vrPct;
    sr(card, 'res_vr', valResid);

    var loyerFin = 0;
    if (base > 0 && duree > 0) {
      loyerFin = pmt(taux / 12, duree, -base, valResid, other);
    }
    sr(card, 'res_loyer_fin', loyerFin);

    var totalMaint = (maintH * heures) / 12;
    sr(card, 'res_maint', totalMaint);

    var loyerServ = totalMaint + vgp + optFs;
    sr(card, 'res_loyer_serv', loyerServ);

    var total = loyerFin + loyerServ;
    var elTotal = card.querySelector('#m' + card.dataset.id + '_res_total');
    if (elTotal) elTotal.textContent = fmt(total) + ' €';

    var coeff = base > 0 ? (loyerFin / base) * 100 : 0;
    var elCoeff = card.querySelector('#m' + card.dataset.id + '_res_coeff');
    if (elCoeff) elCoeff.textContent = coeff ? coeff.toFixed(4).replace('.', ',') : '0';
  }

  function updateHeaders() {
    machines.forEach(function(card, i) {
      var h = card.querySelector('.machine-header h3 span');
      if (h) h.textContent = 'Machine ' + (i + 1);
    });
  }

  async function initPage() {
    var session = await requireSession('../pages/login.html');
    if (!session) return;
    var profile = await loadCurrentProfile();
    if (!profile) { window.location.href = '../pages/login.html'; return; }

    renderNavAccount('navAccount', '../pages/');
    if (profile.is_admin) document.getElementById('backLink').href = '../pages/admin.html';

    var params = new URLSearchParams(window.location.search);
    var toolId = params.get('tool');
    if (!toolId) { document.getElementById('notFoundStep').hidden = false; return; }

    var res = await supabaseClient.from('tools').select('*').eq('id', toolId).single();
    if (!res.data) { document.getElementById('notFoundStep').hidden = false; return; }

    document.getElementById('toolTitle').textContent = res.data.name;
    document.getElementById('toolDesc').textContent = res.data.description || '';
    document.getElementById('content').hidden = false;

    document.getElementById('btnAddMachine').addEventListener('click', function() {
      createMachine();
    });

    createMachine();
  }

  initPage();
})();
</script>
</body>
</html>
